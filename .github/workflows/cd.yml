name: CD

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/cd.yml'

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.PROD_API_URL }}
      - name: Deploy to S3
        uses: jakejarvis/s3-sync-action@v0.5.1
        with:
          args: --follow-symlinks --delete
        env:
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET_FRONTEND }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          SOURCE_DIR: 'frontend/dist'
      - name: Invalidate CloudFront
        run: |
          if [ -n "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" ]; then
            aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}

  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ec2-user/mediavault/Mediavault
            git fetch origin main
            git pull --ff-only origin main

            if ! command -v docker >/dev/null 2>&1; then
              if command -v dnf >/dev/null 2>&1; then
                sudo dnf install -y docker
              elif command -v yum >/dev/null 2>&1; then
                sudo yum install -y docker
              elif command -v apt-get >/dev/null 2>&1; then
                sudo apt-get update
                sudo apt-get install -y docker.io
              else
                echo "Docker is not installed and no supported package manager was found."
                exit 1
              fi
            fi

            sudo systemctl enable docker >/dev/null 2>&1 || true
            sudo systemctl start docker

            DOCKER="docker"
            if ! docker ps >/dev/null 2>&1; then
              DOCKER="sudo docker"
            fi

            if ! $DOCKER ps -a --format '{{.Names}}' | grep -qx mediavault-db-dev; then
              $DOCKER run -d \
                --name mediavault-db-dev \
                --restart unless-stopped \
                -e POSTGRES_USER=mediavault \
                -e POSTGRES_PASSWORD=mediavaultpass \
                -e POSTGRES_DB=mediavault_dev \
                -p 5433:5432 \
                -v mediavault_postgres_data:/var/lib/postgresql/data \
                postgres:15-alpine
            else
              $DOCKER start mediavault-db-dev
            fi

            for i in {1..30}; do
              if $DOCKER exec mediavault-db-dev pg_isready -U mediavault -d mediavault_dev >/dev/null 2>&1; then
                break
              fi
              sleep 2
              if [ "$i" = "30" ]; then
                echo "Database is not ready on EC2. Check docker compose db service or PROD_DATABASE_URL."
                $DOCKER ps || true
                exit 1
              fi
            done
            cd backend
            cat > .env <<'EOF'
            DATABASE_URL="${{ secrets.PROD_DATABASE_URL }}"
            JWT_SECRET="${{ secrets.JWT_SECRET }}"
            JWT_EXPIRES_IN="${{ secrets.JWT_EXPIRES_IN }}"
            GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}"
            PORT=5000
            NODE_ENV=production
            AWS_REGION="${{ secrets.AWS_REGION }}"
            AWS_S3_BUCKET="${{ secrets.AWS_S3_BUCKET_MEDIA }}"
            AWS_ACCESS_KEY_ID="${{ secrets.AWS_MEDIA_ACCESS_KEY_ID }}"
            AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_MEDIA_SECRET_ACCESS_KEY }}"
            EOF
            npm ci
            npx prisma generate
            npx prisma migrate deploy
            pm2 describe mediavault-backend >/dev/null \
              && pm2 restart mediavault-backend --update-env \
              || pm2 start server.js --name mediavault-backend --update-env
            pm2 save
            for i in {1..30}; do
              if curl -fsS http://127.0.0.1:5000/api/health; then
                exit 0
              fi
              sleep 2
            done

            pm2 status
            pm2 logs mediavault-backend --lines 80 --nostream
            exit 1
