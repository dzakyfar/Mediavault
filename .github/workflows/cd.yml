name: CD

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/cd.yml'

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.PROD_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          VITE_TRANSPORT_RATE_PER_KM: ${{ secrets.TRANSPORT_RATE_PER_KM }}
      - name: Deploy to S3
        uses: jakejarvis/s3-sync-action@v0.5.1
        with:
          args: --follow-symlinks --delete
        env:
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET_FRONTEND }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          SOURCE_DIR: 'frontend/dist'
      - name: Invalidate CloudFront
        run: |
          if [ -n "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" ]; then
            aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}

  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ec2-user/mediavault/Mediavault
            git fetch origin main
            git checkout main || git checkout -b main
            git reset --hard origin/main

            if ! command -v docker >/dev/null 2>&1; then
              if command -v dnf >/dev/null 2>&1; then
                sudo dnf install -y docker
              elif command -v yum >/dev/null 2>&1; then
                sudo yum install -y docker
              elif command -v apt-get >/dev/null 2>&1; then
                sudo apt-get update
                sudo apt-get install -y docker.io
              else
                echo "Docker is not installed and no supported package manager was found."
                exit 1
              fi
            fi

            sudo systemctl enable docker >/dev/null 2>&1 || true
            sudo systemctl start docker

            DOCKER="docker"
            if ! docker ps >/dev/null 2>&1; then
              DOCKER="sudo docker"
            fi

            DB_USER="${{ secrets.PROD_POSTGRES_USER }}"
            DB_PASSWORD="${{ secrets.PROD_POSTGRES_PASSWORD }}"
            DB_NAME="${{ secrets.PROD_POSTGRES_DB }}"
            DB_USER="${DB_USER:-mediavault}"
            DB_NAME="${DB_NAME:-mediavault_dev}"

            if [ -z "$DB_PASSWORD" ]; then
              echo "PROD_POSTGRES_PASSWORD is required for the persistent PostgreSQL container."
              exit 1
            fi

            REQUIRED_PROD_DATABASE_URL='${{ secrets.PROD_DATABASE_URL }}'
            REQUIRED_JWT_SECRET='${{ secrets.JWT_SECRET }}'
            REQUIRED_AWS_REGION='${{ secrets.AWS_REGION }}'
            REQUIRED_AWS_S3_BUCKET='${{ secrets.AWS_S3_BUCKET_MEDIA }}'
            REQUIRED_AWS_ACCESS_KEY_ID='${{ secrets.AWS_MEDIA_ACCESS_KEY_ID }}'
            REQUIRED_AWS_SECRET_ACCESS_KEY='${{ secrets.AWS_MEDIA_SECRET_ACCESS_KEY }}'
            REQUIRED_PUBLIC_APP_URL='${{ secrets.PUBLIC_APP_URL }}'

            # KlikQRIS: pilih credentials berdasarkan KLIKQRIS_MODE
            # Jika KLIKQRIS_MODE=sandbox → pakai _SANDBOX secrets
            # Jika KLIKQRIS_MODE=production atau kosong → pakai secrets production
            KLIKQRIS_MODE_VALUE='${{ secrets.KLIKQRIS_MODE }}'
            KLIKQRIS_MODE_VALUE="$(printf '%s' "$KLIKQRIS_MODE_VALUE" | tr '[:upper:]' '[:lower:]' | xargs)"
            KLIKQRIS_MODE_VALUE="${KLIKQRIS_MODE_VALUE#klikqris_mode=}"
            KLIKQRIS_MODE_VALUE="${KLIKQRIS_MODE_VALUE#KLIKQRIS_MODE=}"
            if [ "$KLIKQRIS_MODE_VALUE" = "sandbox" ]; then
              RESOLVED_KLIKQRIS_API_KEY='${{ secrets.KLIKQRIS_API_KEY_SANDBOX }}'
              RESOLVED_KLIKQRIS_MERCHANT_ID='${{ secrets.KLIKQRIS_MERCHANT_ID_SANDBOX }}'
              RESOLVED_KLIKQRIS_BASE_URL='${{ secrets.KLIKQRIS_BASE_URL_SANDBOX }}'
              KLIKQRIS_MODE_VALUE="sandbox"
            else
              RESOLVED_KLIKQRIS_API_KEY='${{ secrets.KLIKQRIS_API_KEY }}'
              RESOLVED_KLIKQRIS_MERCHANT_ID='${{ secrets.KLIKQRIS_MERCHANT_ID }}'
              RESOLVED_KLIKQRIS_BASE_URL='${{ secrets.KLIKQRIS_BASE_URL }}'
              KLIKQRIS_MODE_VALUE="production"
            fi

            for REQUIRED_NAME in REQUIRED_PROD_DATABASE_URL REQUIRED_JWT_SECRET REQUIRED_AWS_REGION REQUIRED_AWS_S3_BUCKET REQUIRED_AWS_ACCESS_KEY_ID REQUIRED_AWS_SECRET_ACCESS_KEY REQUIRED_PUBLIC_APP_URL; do
              if [ -z "${!REQUIRED_NAME}" ]; then
                echo "$REQUIRED_NAME is empty. Check GitHub repository secrets before deploying."
                exit 1
              fi
            done

            if [ -z "$RESOLVED_KLIKQRIS_API_KEY" ] || [ -z "$RESOLVED_KLIKQRIS_MERCHANT_ID" ]; then
              echo "KlikQRIS credentials kosong untuk mode=$KLIKQRIS_MODE_VALUE. Tambahkan KLIKQRIS_API_KEY / KLIKQRIS_MERCHANT_ID (atau versi _SANDBOX) di GitHub Secrets."
              exit 1
            fi

            echo "Backend deploy target: database=$DB_NAME user=$DB_USER media_bucket=$REQUIRED_AWS_S3_BUCKET region=$REQUIRED_AWS_REGION"

            if ! $DOCKER ps -a --format '{{.Names}}' | grep -qx mediavault-db-dev; then
              $DOCKER run -d \
                --name mediavault-db-dev \
                --restart unless-stopped \
                -e POSTGRES_USER="$DB_USER" \
                -e POSTGRES_PASSWORD="$DB_PASSWORD" \
                -e POSTGRES_DB="$DB_NAME" \
                -p 5433:5432 \
                -v mediavault_postgres_data:/var/lib/postgresql/data \
                postgres:15-alpine
            else
              $DOCKER start mediavault-db-dev
            fi

            for i in {1..30}; do
              if $DOCKER exec mediavault-db-dev pg_isready -U "$DB_USER" -d "$DB_NAME" >/dev/null 2>&1; then
                break
              fi
              sleep 2
              if [ "$i" = "30" ]; then
                echo "Database is not ready on EC2. Check docker compose db service or PROD_DATABASE_URL."
                $DOCKER ps || true
                exit 1
              fi
            done
            cd backend
            {
              echo "DATABASE_URL=${{ secrets.PROD_DATABASE_URL }}"
              echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
              echo "JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}"
              echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}"
              echo "PORT=5000"
              echo "NODE_ENV=production"
              echo "AWS_REGION=${{ secrets.AWS_REGION }}"
              echo "AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET_MEDIA }}"
              echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_MEDIA_ACCESS_KEY_ID }}"
              echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_MEDIA_SECRET_ACCESS_KEY }}"
              echo "PUBLIC_APP_URL=${{ secrets.PUBLIC_APP_URL }}"
              echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}"
              echo "TELEGRAM_BOT_USERNAME=${{ secrets.TELEGRAM_BOT_USERNAME }}"
              # HTTP deploy / local-style deploy: gunakan polling karena Telegram webhook wajib HTTPS.
              # Jika nanti backend sudah punya HTTPS domain, ubah secret TELEGRAM_BOT_MODE=webhook dan setWebhook ke /api/telegram/webhook.
              echo "TELEGRAM_BOT_MODE=${{ secrets.TELEGRAM_BOT_MODE }}"
              echo "TELEGRAM_POLLING_INTERVAL_MS=${{ secrets.TELEGRAM_POLLING_INTERVAL_MS }}"
              echo "TELEGRAM_WEBHOOK_SECRET=${{ secrets.TELEGRAM_WEBHOOK_SECRET }}"
              echo "KLIKQRIS_API_KEY=$RESOLVED_KLIKQRIS_API_KEY"
              echo "KLIKQRIS_MERCHANT_ID=$RESOLVED_KLIKQRIS_MERCHANT_ID"
              echo "KLIKQRIS_BASE_URL=$RESOLVED_KLIKQRIS_BASE_URL"
              echo "KLIKQRIS_MODE=$KLIKQRIS_MODE_VALUE"
            } > .env
            npm ci
            npx prisma generate
            npx prisma migrate deploy
            pm2 describe mediavault-backend >/dev/null \
              && pm2 restart mediavault-backend --update-env \
              || pm2 start server.js --name mediavault-backend --update-env
            pm2 save
            for i in {1..30}; do
              if curl -fsS http://127.0.0.1:5000/api/health; then
                exit 0
              fi
              sleep 2
            done

            pm2 status
            pm2 logs mediavault-backend --lines 80 --nostream
            exit 1
